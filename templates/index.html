<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
            outline: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .file-label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #666;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>📄 Resume Analyzer</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="file-label">Upload your resume</label>
            <input type="file" name="resume" required>

            <textarea name="job_desc" placeholder="Paste Job Description here..."></textarea>

            <button type="submit">Analyze Resume</button>
        </form>
    </div>

</body>
</html>
