<!DOCTYPE html>
<html>
<head>
    <title>Analysis Result</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 600px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .score-box {
            text-align: center;
            margin-bottom: 25px;
        }

        .score {
            font-size: 40px;
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            background: #667eea;
            width: {{ score }}%;
        }

        h3 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #444;
        }

        ul {
            list-style: none;
        }

        li {
            background: #f4f6ff;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        li:hover {
            transform: translateX(5px);
            background: #e0e7ff;
        }

        .missing li {
            background: #ffe4e6;
        }

        .missing li:hover {
            background: #fecdd3;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 25px;
            padding: 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #5a67d8;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>📊 Analysis Result</h2>

    <div class="score-box">
        <div class="score">{{ score }}%</div>

        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <h3>✅ Skills Found</h3>
    <ul>
        {% for s in skills %}
        <li>{{ s }}</li>
        {% endfor %}
    </ul>

    <h3>❌ Missing Skills</h3>
    <ul class="missing">
        {% for m in missing %}
        <li>{{ m }}</li>
        {% endfor %}
    </ul>

    <a href="/" class="back-btn">⬅ Go Back</a>

</div>

</body>
</html>
